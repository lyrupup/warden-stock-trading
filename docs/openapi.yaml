openapi: 3.0.3
info:
  title: 守望者股票交易系统 API
  description: |
    Warden Stock Trading System OpenAPI 定义。
    与《后端技术开发文档》(docs/BACKEND.md) §4 接口文档保持一致，作为前后端并行开发的接口契约来源。
    - 统一响应体：{ code, message, data }，code=0 为成功。
    - 鉴权：Authorization: Bearer <token>（单用户模式可省略）。
    - 分页：query page/size，响应 data={list,total,page,size}。
    - 流式接口（AI 分析）走 SSE，不在本文件 JSON schema 内描述，详见 BACKEND.md §4.10。
    - **金额/价格/数量/比率统一为 decimal 字符串**（type: string，见 components.schemas.Decimal）：
      后端用 shopspring/decimal 保精度，JSON 序列化为带引号字符串（如 "10.5000"）。
      前端须经统一 decimal 工具转 number 后再计算/格式化，禁止直接对其做算术或 .toFixed()。
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
    description: 本地开发
tags:
  - name: Auth
    description: 鉴权（多用户预留）
  - name: Market
    description: M1 大盘与 A 股行情（Scan 侦查）
  - name: Strategy
    description: M2 选股策略（Insight 洞察）
  - name: Position
    description: M3 持仓记录（Scan 侦查）
  - name: Risk
    description: M4 持仓分析与风控（Insight + Alert）
  - name: Task
    description: M5 定时任务（Alert + Message）
  - name: AI
    description: M6 AI 对话分析（Insight 洞察）
  - name: Settings
    description: M7 个人中心配置

paths:
  # ---------------- Auth ----------------
  /auth/login:
    post:
      tags: [Auth]
      summary: 登录获取 token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          token: { type: string }
                          user: { $ref: "#/components/schemas/User" }
  /auth/register:
    post:
      tags: [Auth]
      summary: 注册（多用户预留）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
                nickname: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /auth/me:
    get:
      tags: [Auth]
      summary: 当前用户信息
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/User" } }

  # ---------------- Market ----------------
  /market/indices:
    get:
      tags: [Market]
      summary: 当日大盘指数列表
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/IndexQuote" }
  /market/overview:
    get:
      tags: [Market]
      summary: 市场概览（涨跌家数、北向资金等）
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /market/watchlist:
    get:
      tags: [Market]
      summary: 自选股列表
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/WatchItem" }
    post:
      tags: [Market]
      summary: 添加自选股
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stock_code]
              properties:
                stock_code: { type: string, example: "600519" }
                group_name: { type: string, default: "default" }
                remark: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /market/watchlist/{id}:
    delete:
      tags: [Market]
      summary: 删除自选股
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /market/watchlist/quotes:
    get:
      tags: [Market]
      summary: 自选股实时行情
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/StockQuote" }
  /market/stocks/{code}:
    get:
      tags: [Market]
      summary: 个股行情详情
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CodePath" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/StockQuote" } }
  /market/stocks/{code}/kline:
    get:
      tags: [Market]
      summary: K 线数据
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/CodePath" }
        - name: period
          in: query
          schema: { type: string, enum: [day, week, month, "1m", "5m", "15m", "30m", "60m"], default: day }
        - name: adjust
          in: query
          schema: { type: string, enum: ["", qfq, hfq], default: qfq }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Kline" }
  /market/search:
    get:
      tags: [Market]
      summary: 股票搜索
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: kw, in: query, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  # ---------------- Strategy ----------------
  /strategies:
    get:
      tags: [Strategy]
      summary: 策略列表
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: kw, in: query, schema: { type: string } }
        - { name: tag, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Strategy" }
    post:
      tags: [Strategy]
      summary: 新建策略
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateStrategyReq" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/Strategy" } }
  /strategies/{id}:
    get:
      tags: [Strategy]
      summary: 策略详情（含指标、skill）
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/Strategy" } }
    put:
      tags: [Strategy]
      summary: 更新策略
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateStrategyReq" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    delete:
      tags: [Strategy]
      summary: 删除策略
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /strategies/{id}/copy:
    post:
      tags: [Strategy]
      summary: 复制策略
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /strategies/{id}/indicators:
    put:
      tags: [Strategy]
      summary: 更新指标定义
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IndicatorGroup" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /strategies/{id}/skill:
    get:
      tags: [Strategy]
      summary: 获取 skill.md
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    put:
      tags: [Strategy]
      summary: 保存 skill.md（生成新版本）
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /strategies/{id}/backtest:
    post:
      tags: [Strategy]
      summary: 发起回测（异步）
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_date: { type: string, format: date }
                end_date: { type: string, format: date }
                universe: { type: array, items: { type: string } }
                initial_capital: { type: number }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: object
                        properties: { taskId: { type: string } }
  /strategies/{id}/backtest/{taskId}:
    get:
      tags: [Strategy]
      summary: 查询回测结果（后续迭代）
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { name: taskId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/BacktestResult" } }
  /strategies/indicators/catalog:
    get:
      tags: [Strategy]
      summary: 量化因子目录（可选因子类型/参数/说明，供前端构造器渲染）
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/IndicatorCatalogItem" }
  /strategies/templates:
    get:
      tags: [Strategy]
      summary: 内置策略模板（短线多头 / 中长线震荡，含量化指标定义）
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/StrategyTemplate" }
  /strategies/{id}/screen:
    post:
      tags: [Strategy]
      summary: 发起量化粗筛（异步）
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScreenReq" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: object
                        properties: { taskId: { type: string } }
  /strategies/{id}/screen/{taskId}:
    get:
      tags: [Strategy]
      summary: 查询粗筛结果（候选列表 + 指标快照）
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { name: taskId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/ScreenResult" } }
  /strategies/{id}/screen/latest:
    get:
      tags: [Strategy]
      summary: 最近一次粗筛结果
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/ScreenResult" } }
  /strategies/screen/preview:
    post:
      tags: [Strategy]
      summary: 同步快速粗筛预览（小股票池/自选池，便于调参，不落任务表）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ScreenReq"
                - type: object
                  properties:
                    indicators: { $ref: "#/components/schemas/IndicatorGroup" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/ScreenResult" } }

  # ---------------- Position ----------------
  /positions:
    get:
      tags: [Position]
      summary: 持仓列表（含浮盈）
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Position" }
    post:
      tags: [Position]
      summary: 新建持仓
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stock_code]
              properties:
                stock_code: { type: string }
                stock_name: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /positions/summary:
    get:
      tags: [Position]
      summary: 账户总览
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/AccountSummary" } }
  /positions/{id}:
    get:
      tags: [Position]
      summary: 持仓详情
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    put:
      tags: [Position]
      summary: 编辑持仓
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    delete:
      tags: [Position]
      summary: 删除持仓
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /positions/{id}/trades:
    get:
      tags: [Position]
      summary: 交易流水（分页）
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Size" }
      responses:
        "200": { $ref: "#/components/responses/PageOk" }
    post:
      tags: [Position]
      summary: 录入交易（自动重算均价/盈亏）
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddTradeReq" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /positions/{id}/trades/{tid}:
    delete:
      tags: [Position]
      summary: 删除交易记录（重算）
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { name: tid, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  # ---------------- Risk ----------------
  /risk/analysis:
    post:
      tags: [Risk]
      summary: 触发每日持仓 AI 分析（SSE 流式，见 BACKEND.md §4.10）
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: text/event-stream 流式响应
          content:
            text/event-stream:
              schema: { type: string }
    get:
      tags: [Risk]
      summary: 查询某日分析报告
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: date, in: query, schema: { type: string, format: date } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/PositionAnalysisReport" } }
  /risk/analysis/history:
    get:
      tags: [Risk]
      summary: 历史分析列表（分页）
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Size" }
      responses:
        "200": { $ref: "#/components/responses/PageOk" }
  /risk/premarket:
    post:
      tags: [Risk]
      summary: 生成明日盘前预案
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    get:
      tags: [Risk]
      summary: 查询盘前预案
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: date, in: query, schema: { type: string, format: date } }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /risk/alerts:
    get:
      tags: [Risk]
      summary: 告警记录列表
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  # ---------------- Task ----------------
  /tasks:
    get:
      tags: [Task]
      summary: 任务列表
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/ScheduledTask" }
    post:
      tags: [Task]
      summary: 新建任务
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTaskReq" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /tasks/{id}:
    get:
      tags: [Task]
      summary: 任务详情
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    put:
      tags: [Task]
      summary: 编辑任务
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTaskReq" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    delete:
      tags: [Task]
      summary: 删除任务
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /tasks/{id}/toggle:
    patch:
      tags: [Task]
      summary: 启用/停用
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /tasks/{id}/run:
    post:
      tags: [Task]
      summary: 立即执行一次
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /tasks/{id}/logs:
    get:
      tags: [Task]
      summary: 执行记录（分页）
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Size" }
      responses:
        "200": { $ref: "#/components/responses/PageOk" }

  # ---------------- AI ----------------
  /ai/conversations:
    get:
      tags: [AI]
      summary: 会话列表
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    post:
      tags: [AI]
      summary: 新建会话
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [strategy_id, stock_code]
              properties:
                strategy_id: { type: integer }
                stock_code: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /ai/conversations/{id}/messages:
    get:
      tags: [AI]
      summary: 会话消息
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /ai/conversations/{id}/report:
    post:
      tags: [AI]
      summary: 由对话生成结构化报告
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /ai/stream:
    post:
      tags: [AI]
      summary: 发送消息（SSE 流式返回，见 BACKEND.md §4.10）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversation_id, content]
              properties:
                conversation_id: { type: integer }
                content: { type: string }
      responses:
        "200":
          description: text/event-stream 流式响应
          content:
            text/event-stream:
              schema: { type: string }
  /ai/reports:
    get:
      tags: [AI]
      summary: 报告库检索
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: stock_code, in: query, schema: { type: string } }
        - { name: strategy_id, in: query, schema: { type: integer } }
        - { name: date, in: query, schema: { type: string, format: date } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/StockAnalysisReport" }
  /ai/reports/grouped:
    get:
      tags: [AI]
      summary: 按股票代码分组的报告库
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /ai/reports/{id}:
    get:
      tags: [AI]
      summary: 报告详情
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties: { data: { $ref: "#/components/schemas/StockAnalysisReport" } }
  /ai/reports/{id}/push:
    post:
      tags: [AI]
      summary: 推送报告到飞书
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  # ---------------- Settings ----------------
  /settings:
    get:
      tags: [Settings]
      summary: 获取全部配置（敏感字段脱敏）
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /settings/{group}:
    put:
      tags: [Settings]
      summary: 按组保存配置
      security: [{ bearerAuth: [] }]
      parameters:
        - name: group
          in: path
          required: true
          schema: { type: string, enum: [ai, feishu, datasource, preference, profile] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /settings/feishu/test:
    post:
      tags: [Settings]
      summary: 测试飞书机器人连通性
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /settings/ai/test:
    post:
      tags: [Settings]
      summary: 测试大模型连通性
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer }
    CodePath:
      name: code
      in: path
      required: true
      schema: { type: string }
      example: "600519"
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    Size:
      name: size
      in: query
      schema: { type: integer, default: 20 }

  responses:
    Ok:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiResponse" }
    PageOk:
      description: 分页成功
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiResponse"
              - properties: { data: { $ref: "#/components/schemas/PageResult" } }

  schemas:
    ApiResponse:
      type: object
      properties:
        code: { type: integer, example: 0 }
        message: { type: string, example: ok }
        data: { type: object, nullable: true }
    PageResult:
      type: object
      properties:
        list: { type: array, items: { type: object } }
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }
    Decimal:
      type: string
      description: >-
        高精度十进制数值，**JSON 序列化为字符串**（后端使用 shopspring/decimal，
        金额/价格/比率均如此），如 "10.5000"、"1.94"。前端需用统一的 decimal 解析工具
        （`lib/decimal.ts` 的 `toNumber` / `coerceDecimalFields`）转 number 后再计算或格式化。
        作为请求体入参时，后端同时可解析数字与字符串（如 10.5 或 "10.5"）。
      example: "10.5000"
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        nickname: { type: string }
        avatar: { type: string }
        status: { type: integer }
    IndexQuote:
      type: object
      description: 数值字段为 decimal 字符串（见 Decimal）。
      properties:
        index_code: { type: string, example: "000001" }
        index_name: { type: string, example: "上证指数" }
        price: { $ref: "#/components/schemas/Decimal" }
        change_amount: { $ref: "#/components/schemas/Decimal" }
        change_percent: { $ref: "#/components/schemas/Decimal" }
        volume: { $ref: "#/components/schemas/Decimal" }
        amount: { $ref: "#/components/schemas/Decimal" }
        trade_date: { type: string, format: date }
    StockQuote:
      type: object
      description: 数值字段为 decimal 字符串（见 Decimal）。
      properties:
        stock_code: { type: string }
        stock_name: { type: string }
        price: { $ref: "#/components/schemas/Decimal" }
        open: { $ref: "#/components/schemas/Decimal" }
        high: { $ref: "#/components/schemas/Decimal" }
        low: { $ref: "#/components/schemas/Decimal" }
        prev_close: { $ref: "#/components/schemas/Decimal" }
        change_percent: { $ref: "#/components/schemas/Decimal" }
        volume: { $ref: "#/components/schemas/Decimal" }
        amount: { $ref: "#/components/schemas/Decimal" }
        turnover_rate: { $ref: "#/components/schemas/Decimal" }
        trade_date: { type: string, format: date }
        stale: { type: boolean, description: 是否为降级返回的过期快照 }
    Kline:
      type: object
      description: 数值字段为 decimal 字符串（见 Decimal）。
      properties:
        date: { type: string }
        open: { $ref: "#/components/schemas/Decimal" }
        high: { $ref: "#/components/schemas/Decimal" }
        low: { $ref: "#/components/schemas/Decimal" }
        close: { $ref: "#/components/schemas/Decimal" }
        volume: { $ref: "#/components/schemas/Decimal" }
        amount: { $ref: "#/components/schemas/Decimal" }
    WatchItem:
      type: object
      properties:
        id: { type: integer }
        stock_code: { type: string }
        stock_name: { type: string }
        group_name: { type: string }
        remark: { type: string }
    Strategy:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        tags: { type: string }
        status: { type: integer }
        indicators: { $ref: "#/components/schemas/IndicatorGroup" }
        skill: { type: string, description: skill.md 内容 }
        skill_version: { type: integer }
        created_at: { type: string, format: date-time }
    CreateStrategyReq:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        tags: { type: string }
        indicators: { $ref: "#/components/schemas/IndicatorGroup" }
    FactorExpr:
      type: object
      description: >-
        量化因子表达式，作为规则的左/右操作数。type 决定参数：
        ma{period} 移动均线；ma_align{periods,direction} 多头/空头排列(布尔)；
        bias{period} 乖离率%；amplitude 当日振幅%；amplitude_streak{threshold,days} 连续振幅(布尔)；
        pct_change{period} N日涨跌幅%；field{field} 原始字段；vol_ratio{period} 量比；const{value} 常量。
      required: [type]
      properties:
        type:
          type: string
          enum: [ma, ma_align, bias, amplitude, amplitude_streak, pct_change, field, vol_ratio, const]
        period: { type: integer, description: "ma/bias/pct_change/vol_ratio 的周期" }
        periods: { type: array, items: { type: integer }, description: "ma_align 的有序周期，如 [5,10,20]" }
        direction: { type: string, enum: [bull, bear], description: "ma_align 排列方向（多头/空头）" }
        field:
          type: string
          enum: [close, open, high, low, prev_close, volume, amount, change_percent]
          description: "type=field 时取的原始 K 线字段（turnover_rate 需快照数据，暂不支持）"
        threshold: { type: number, description: "amplitude_streak 振幅阈值(%)" }
        days: { type: integer, description: "amplitude_streak 连续天数" }
        eps: { type: number, description: "ma_align 容差，默认 0" }
        value:
          description: "type=const 时的常量值（数值或布尔）"
          oneOf:
            - { type: number }
            - { type: boolean }
    IndicatorRule:
      type: object
      description: 单条量化规则，统一为 left op right；布尔因子默认与 const(true) 比较。
      required: [left, op, right]
      properties:
        left: { $ref: "#/components/schemas/FactorExpr" }
        op: { type: string, enum: [">", ">=", "<", "<=", "==", "!="] }
        right: { $ref: "#/components/schemas/FactorExpr" }
    IndicatorGroup:
      type: object
      description: 量化因子规则组，支持 and/or 与嵌套子组，由粗筛引擎执行。
      properties:
        logic: { type: string, enum: [and, or], default: and }
        rules:
          type: array
          items: { $ref: "#/components/schemas/IndicatorRule" }
        groups:
          type: array
          description: 嵌套子规则组（结构同 IndicatorGroup）
          items: { $ref: "#/components/schemas/IndicatorGroup" }
    IndicatorCatalogItem:
      type: object
      description: 量化因子目录项（只读元数据），供前端指标构造器动态渲染。
      properties:
        type: { type: string, example: "ma_align" }
        name: { type: string, example: "均线多头/空头排列" }
        value_type: { type: string, enum: [number, bool], description: 因子产出类型 }
        unit: { type: string, example: "%", description: 数值单位（如有） }
        description: { type: string }
        params:
          type: array
          description: 参数定义（名称/类型/默认值/说明）
          items:
            type: object
            properties:
              key: { type: string, example: "periods" }
              type: { type: string, example: "int[]" }
              required: { type: boolean }
              default: {}
              desc: { type: string }
    StrategyTemplate:
      type: object
      description: 内置策略模板。
      properties:
        key: { type: string, example: "short_ma_bull" }
        name: { type: string, example: "短线均线多头排列" }
        description: { type: string }
        tags: { type: string }
        scenario: { type: string, description: 适用场景说明 }
        indicators: { $ref: "#/components/schemas/IndicatorGroup" }
    ScreenReq:
      type: object
      description: 量化粗筛请求。
      properties:
        universe:
          type: object
          properties:
            type: { type: string, enum: [all, board, watchlist, codes], default: watchlist }
            board: { type: string, description: "type=board 时的板块代码" }
            codes: { type: array, items: { type: string }, description: "type=codes 时的代码列表" }
        trade_date: { type: string, format: date, description: 留空=最新交易日 }
        limit: { type: integer, default: 200, description: 候选上限（按评分截断） }
    ScreenCandidate:
      type: object
      description: 粗筛命中候选（数值字段为 decimal 字符串，见 Decimal）。
      properties:
        stock_code: { type: string }
        stock_name: { type: string }
        score: { $ref: "#/components/schemas/Decimal" }
        factors:
          type: object
          additionalProperties: { $ref: "#/components/schemas/Decimal" }
          description: 命中标的的关键因子快照值（如 ma5/ma10/ma20/bias5/amplitude）
        matched:
          type: array
          items: { type: integer }
          description: 命中的规则索引（供前端高亮）
    ScreenResult:
      type: object
      properties:
        id: { type: integer }
        strategy_id: { type: integer }
        status: { type: integer, description: "0 pending,1 running,2 done,3 failed" }
        trade_date: { type: string, format: date }
        universe_count: { type: integer, description: 实际扫描标的数 }
        matched_count: { type: integer, description: 命中候选数 }
        candidates:
          type: array
          items: { $ref: "#/components/schemas/ScreenCandidate" }
        error_msg: { type: string }
        created_at: { type: string, format: date-time }
    BacktestResult:
      type: object
      properties:
        id: { type: integer }
        status: { type: integer, description: "0 pending,1 running,2 done,3 failed" }
        metrics:
          type: object
          description: 指标值为 decimal 字符串（见 Decimal）。
          properties:
            total_return: { $ref: "#/components/schemas/Decimal" }
            max_drawdown: { $ref: "#/components/schemas/Decimal" }
            win_rate: { $ref: "#/components/schemas/Decimal" }
            sharpe: { $ref: "#/components/schemas/Decimal" }
        curve:
          type: array
          items:
            type: object
            properties:
              date: { type: string }
              nav: { $ref: "#/components/schemas/Decimal" }
        error_msg: { type: string }
    Position:
      type: object
      description: 金额/数量字段为 decimal 字符串（见 Decimal）。
      properties:
        id: { type: integer }
        stock_code: { type: string }
        stock_name: { type: string }
        quantity: { $ref: "#/components/schemas/Decimal" }
        avg_cost: { $ref: "#/components/schemas/Decimal" }
        total_cost: { $ref: "#/components/schemas/Decimal" }
        current_price: { $ref: "#/components/schemas/Decimal" }
        market_value: { $ref: "#/components/schemas/Decimal" }
        float_pnl:
          allOf:
            - $ref: "#/components/schemas/Decimal"
            - description: 浮动盈亏（decimal 字符串）
        float_pnl_ratio: { $ref: "#/components/schemas/Decimal" }
        realized_pnl:
          allOf:
            - $ref: "#/components/schemas/Decimal"
            - description: 已实现盈亏（decimal 字符串）
        status: { type: integer, description: "1 持有,2 已清仓" }
    AddTradeReq:
      type: object
      required: [side, price, quantity, traded_at]
      properties:
        side: { type: integer, enum: [1, 2], description: "1 买入,2 卖出" }
        price: { $ref: "#/components/schemas/Decimal" }
        quantity: { $ref: "#/components/schemas/Decimal" }
        fee: { $ref: "#/components/schemas/Decimal" }
        tax: { $ref: "#/components/schemas/Decimal" }
        traded_at: { type: string, format: date-time }
        remark: { type: string }
    AccountSummary:
      type: object
      description: 金额/比率字段为 decimal 字符串（见 Decimal）。
      properties:
        total_market_value: { $ref: "#/components/schemas/Decimal" }
        total_cost: { $ref: "#/components/schemas/Decimal" }
        total_float_pnl: { $ref: "#/components/schemas/Decimal" }
        total_return_ratio: { $ref: "#/components/schemas/Decimal" }
        today_pnl: { $ref: "#/components/schemas/Decimal" }
    PositionAnalysisReport:
      type: object
      properties:
        id: { type: integer }
        report_date: { type: string, format: date }
        content: { type: string, description: Markdown }
        risk_level: { type: integer }
        risk_items:
          type: array
          items:
            type: object
            properties:
              level: { type: integer }
              target: { type: string }
              desc: { type: string }
              advice: { type: string }
    ScheduledTask:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        task_type: { type: string, enum: [fetch_data, analysis, report, push] }
        cron_expr: { type: string }
        trading_day_only: { type: boolean }
        enabled: { type: boolean }
        next_run_at: { type: string, format: date-time }
        payload: { type: object, additionalProperties: true }
    CreateTaskReq:
      type: object
      required: [name, task_type, cron_expr]
      properties:
        name: { type: string }
        task_type: { type: string, enum: [fetch_data, analysis, report, push] }
        cron_expr: { type: string, example: "0 30 15 * * 1-5" }
        trading_day_only: { type: boolean, default: true }
        payload: { type: object, additionalProperties: true }
    StockAnalysisReport:
      type: object
      properties:
        id: { type: integer }
        stock_code: { type: string }
        strategy_id: { type: integer }
        conversation_id: { type: integer }
        title: { type: string }
        content: { type: string, description: 结构化报告 Markdown }
        tags: { type: string }
        created_at: { type: string, format: date-time }
